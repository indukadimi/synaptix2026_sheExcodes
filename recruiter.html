<h2>Recruiter Project Upload</h2>

<form method="POST">

Project Title:
<input name="title"><br><br>

Project Description:
<textarea name="description"></textarea><br><br>

Domain:
<input name="domain"><br><br>

Duration (weeks):
<input name="duration" type="number"><br><br>

<h3>Required Skills (1–5)</h3>
Python: <input name="python" type="number"><br>
ML: <input name="ml" type="number"><br>
SQL: <input name="sql" type="number"><br><br>

<h3>Skill Weights (must total 1.0)</h3>
Python Weight: <input name="w_python" step="0.1"><br>
ML Weight: <input name="w_ml" step="0.1"><br>
SQL Weight: <input name="w_sql" step="0.1"><br><br>

<button type="submit">Submit Project</button>
</form>
